<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DCAS CPG 2025 · S1 Scope of Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    
    <!-- PWA Manifest and icons -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0056b3">
    <link rel="apple-touch-icon" href="../icon.png">


    <style>
        /* ========== Level selection modal (inline) ========== */
        .level-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
        }
        .level-modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: var(--text-primary);
        }
        .level-modal h3 {
            margin-top: 0;
            font-size: 1.6rem;
            color: var(--primary-accent);
        }
        .level-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .level-option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .level-option input {
            margin: 0;
            accent-color: var(--primary-accent);
        }
        .dont-show-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn.primary {
            background: var(--primary-accent);
            color: white;
        }
        .modal-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        .modal-btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="icon-btn" id="homeBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="header-text">
            <h1 id="pageTitle">S1 Scope of Practice</h1>
            <p id="pageSubtitle">DCAS CPG 2025</p>
        </div>
    </div>
    <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Switch Theme">🎨</button>
        <div class="stats-badge" id="liveStatsBadge">
            <span>📊 <span id="statsAttempts">0</span></span>
            <div class="stats-divider"></div>
            <span>🎯 <span id="statsCritical">0%</span></span>
        </div>
        <a href="c-index.html?view=summary" class="icon-btn" id="headerIndexBtn" title="Index">📋</a>
        <a href="../about.html" class="icon-btn" id="headerAboutBtn" title="About">ℹ️</a>
    </div>
</header>

<main id="mainContent"></main>

<footer>
    <div>Created by Soliman Anas · for study aid only</div>
    <div><a href="../about.html">About & Disclaimer</a> · Refer to DCAS CPG and memo for procedures and protocols.</div>
</footer>

<script src="../content/s1.js"></script>
<script src="../app.js"></script>

<script>
    (function() {
        const themeBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        const themes = ['dark', 'light', 'sepia', 'forest'];
        
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
        }

        function nextTheme() {
            const current = html.getAttribute('data-theme') || 'dark';
            const currentIndex = themes.indexOf(current);
            const nextIndex = (currentIndex + 1) % themes.length;
            const next = themes[nextIndex];
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        if (themeBtn) {
            themeBtn.addEventListener('click', nextTheme);
        }
        initTheme();

        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        function loadStats() {
            try {
                const data = localStorage.getItem('dcas_cpg_stats');
                const stats = data ? JSON.parse(data) : { totalAttempts: 0, critical: { total: 0, correct: 0 } };
                const critAcc = stats.critical.total ? Math.round((stats.critical.correct / stats.critical.total) * 100) : 0;
                document.getElementById('statsAttempts').innerText = stats.totalAttempts || 0;
                document.getElementById('statsCritical').innerText = `${critAcc}%`;
            } catch(e) {}
        }
        loadStats();
    })();
</script>

<!-- ========== Level Selection Modal (inline JS) ========== -->
<script>
    (function() {
        // Level ranks (higher = more advanced)
        const LEVELS = {
            'ER': { rank: 1, label: 'Emergency Responder' },
            'EMR': { rank: 2, label: 'Emergency Medical Responder' },
            'EMT': { rank: 3, label: 'Emergency Medical Technician' },
            'EMT-A': { rank: 4, label: 'EMT – Advanced' },
            'P': { rank: 5, label: 'Paramedic' },
            'AP': { rank: 6, label: 'Advanced Paramedic' },
            'EP': { rank: 7, label: 'Emergency Physician' }
        };

        const STORAGE_KEY_LEVEL = 'dcas_user_level';
        const STORAGE_KEY_DONT_SHOW = 'dcas_level_modal_dont_show';

        let currentLevel = localStorage.getItem(STORAGE_KEY_LEVEL) || 'EMT';
        let dontShowAgain = localStorage.getItem(STORAGE_KEY_DONT_SHOW) === 'true';

        window.userLevel = currentLevel;
        window.userLevelRank = LEVELS[currentLevel] ? LEVELS[currentLevel].rank : 3;

        // Helper: filter an array by minLevel (if property exists)
        function filterByLevel(items) {
            if (!items || !items.length) return items;
            const rank = window.userLevelRank;
            return items.filter(item => {
                if (item.minLevel === undefined) return true;
                const requiredRank = LEVELS[item.minLevel] ? LEVELS[item.minLevel].rank : 0;
                return rank >= requiredRank;
            });
        }

        // Save level and optionally hide modal
        function setUserLevel(level, dontShow = false) {
            if (!LEVELS[level]) level = 'EMT';
            window.userLevel = level;
            window.userLevelRank = LEVELS[level].rank;
            localStorage.setItem(STORAGE_KEY_LEVEL, level);
            if (dontShow) {
                localStorage.setItem(STORAGE_KEY_DONT_SHOW, 'true');
            } else {
                localStorage.removeItem(STORAGE_KEY_DONT_SHOW);
            }
            window.location.reload();
        }

        // Create modal (if not already present)
        function createModal() {
            if (document.getElementById('userLevelModal')) return;

            const modalHtml = `
                <div id="userLevelModal" class="level-modal-overlay">
                    <div class="level-modal">
                        <h3>Select Your Clinical Level</h3>
                        <p>Choose your qualification level. This will filter practice questions and flashcards to match your scope of practice. (Summary pages always show full guidelines.)</p>
                        <div class="level-options">
                            ${Object.entries(LEVELS).map(([key, val]) => `
                                <label class="level-option">
                                    <input type="radio" name="userLevel" value="${key}" ${currentLevel === key ? 'checked' : ''}>
                                    <span>${val.label} (${key})</span>
                                </label>
                            `).join('')}
                        </div>
                        <label class="dont-show-option">
                            <input type="checkbox" id="dontShowAgainCheckbox" ${dontShowAgain ? 'checked' : ''}>
                            Don't show again
                        </label>
                        <div class="modal-buttons">
                            <button id="saveLevelBtn" class="modal-btn primary">Save</button>
                            <button id="closeLevelModalBtn" class="modal-btn secondary">Close</button>
                        </div>
                    </div>
                </div>
            `;

            const container = document.createElement('div');
            container.innerHTML = modalHtml;
            document.body.appendChild(container.firstChild);

            const modal = document.getElementById('userLevelModal');
            const saveBtn = document.getElementById('saveLevelBtn');
            const closeBtn = document.getElementById('closeLevelModalBtn');
            const dontShowCheckbox = document.getElementById('dontShowAgainCheckbox');

            saveBtn.addEventListener('click', () => {
                const selected = document.querySelector('input[name="userLevel"]:checked');
                if (selected) {
                    const level = selected.value;
                    const dontShow = dontShowCheckbox.checked;
                    setUserLevel(level, dontShow);
                } else {
                    alert('Please select a level');
                }
            });

            closeBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });
        }

        // Show modal if needed
        function showModalIfNeeded() {
            if (!dontShowAgain) {
                createModal();
                const modal = document.getElementById('userLevelModal');
                if (modal) modal.style.display = 'flex';
            }
        }

        // Override render functions to filter content (call after data is loaded)
        // Wait for app.js to load and initialize window.render
        function patchRenderFunctions() {
            if (!window.render) {
                setTimeout(patchRenderFunctions, 100);
                return;
            }

            const originalRenderFlashcards = window.render.flashcards;
            const originalRenderQuizSetup = window.render.quizSetup;
            const originalRenderQuizGame = window.render.quizGame;
            const originalRenderCriticalGame = window.render.criticalGame;

            window.render.flashcards = function() {
                if (window.isChapterMissing) { window.renderComingSoon(); return; }
                const section = window.state.activeSection;
                if (!section) return;
                const originalFlash = window.state.flashData;
                window.state.flashData = filterByLevel(section.flashcards || []);
                originalRenderFlashcards.call(this);
                window.state.flashData = originalFlash;
            };

            window.render.quizSetup = function() {
                if (window.isChapterMissing) { window.renderComingSoon(); return; }
                const section = window.state.activeSection;
                if (!section) return;
                originalRenderQuizSetup.call(this);
            };

            window.render.quizGame = function() {
                if (window.isChapterMissing) { window.renderComingSoon(); return; }
                if (!window.state.quizData.length) {
                    window.render.quizSetup();
                    return;
                }
                const originalQuiz = window.state.quizData;
                window.state.quizData = filterByLevel(originalQuiz);
                originalRenderQuizGame.call(this);
                window.state.quizData = originalQuiz;
            };

            window.render.criticalGame = function() {
                if (window.isChapterMissing) { window.renderComingSoon(); return; }
                const section = window.state.activeSection;
                if (!section) return;
                const originalCritical = window.state.criticalData;
                window.state.criticalData = filterByLevel(section.critical || []);
                originalRenderCriticalGame.call(this);
                window.state.criticalData = originalCritical;
            };
        }

        // Add a "Change Level" button in the drawer if it exists (optional)
        function addLevelChanger() {
            const drawer = document.getElementById('notificationDrawer');
            if (!drawer) return;
            if (document.getElementById('changeLevelBtn')) return;
            const shortcutRow = drawer.querySelector('.shortcut-row .toggles-grid');
            if (shortcutRow) {
                const item = document.createElement('div');
                item.className = 'toggle-item';
                item.innerHTML = `<div class="toggle-btn" id="changeLevelBtn">🎚️</div><div class="toggle-label">Level</div>`;
                shortcutRow.appendChild(item);
                document.getElementById('changeLevelBtn')?.addEventListener('click', () => {
                    localStorage.removeItem(STORAGE_KEY_DONT_SHOW);
                    dontShowAgain = false;
                    createModal();
                    const modal = document.getElementById('userLevelModal');
                    if (modal) modal.style.display = 'flex';
                });
            }
        }

        // Export functions globally
        window.filterByLevel = filterByLevel;
        window.setUserLevel = setUserLevel;

        document.addEventListener('DOMContentLoaded', () => {
            showModalIfNeeded();
            patchRenderFunctions();
            addLevelChanger();
        });
    })();
</script>
