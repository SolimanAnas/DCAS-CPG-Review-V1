<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DCAS · ECG Simulator</title>
<script>
  (function(){
    var t=localStorage.getItem('theme')||'dark';
    document.documentElement.setAttribute('data-theme',t);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root{--bg:#07111f;--sf:rgba(255,255,255,.055);--sf2:rgba(255,255,255,.09);--br:rgba(255,255,255,.10);--text:#dde6f0;--muted:#5a7080;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--blue:#3b82f6;--cyan:#06b6d4;--mono:'DM Mono',monospace;--hdr:60px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);background-image:radial-gradient(ellipse 90% 50% at 15% 0%,rgba(15,39,68,.8),transparent),radial-gradient(ellipse 70% 50% at 85% 100%,rgba(40,10,80,.5),transparent);color:var(--text);min-height:100%;display:flex;flex-direction:column;overflow-x:hidden}

/* HEADER */
.app-header{height:var(--hdr);background:rgba(7,17,31,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:60;flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:11px;background:var(--sf2);border:1px solid var(--br);color:var(--text);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:.9rem;flex-shrink:0}
.hdr-badge{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#be123c,#e11d48);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(225,29,72,.35)}
.hdr-info{flex:1}
.hdr-title{font-size:.93rem;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:.65rem;color:var(--muted)}
.hdr-pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pg 2s infinite;flex-shrink:0}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.page-body{flex:1;overflow-y:auto;padding:14px 14px 40px;display:flex;flex-direction:column;gap:14px;max-width:680px;width:100%;margin:0 auto}

/* PRIORITY BANNER */
.priority-banner{border-radius:16px;padding:13px 16px;display:flex;align-items:flex-start;gap:12px;border:2px solid;animation:bIn .3s ease}
@keyframes bIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.pb-icon{font-size:1.4rem;flex-shrink:0;margin-top:1px}
.pb-level{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.7}
.pb-msg{font-size:.88rem;font-weight:700;line-height:1.3;margin-top:1px}
.pb-sub{font-size:.72rem;opacity:.78;margin-top:3px;line-height:1.4}
.b-green{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#86efac}
.b-yellow{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.4);color:#fde047}
.b-orange{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.4);color:#fdba74}
.b-red{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.5);color:#fca5a5}
.b-arrest{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.7);color:#fca5a5;box-shadow:0 0 24px rgba(239,68,68,.28);animation:bIn .3s ease,aP 1.4s infinite}
@keyframes aP{0%,100%{box-shadow:0 0 18px rgba(239,68,68,.22)}50%{box-shadow:0 0 40px rgba(239,68,68,.55)}}

/* ECG MONITOR */
.monitor-wrap{border-radius:20px;background:#030b16;border:2px solid rgba(0,200,100,.22);position:relative;overflow:hidden;height:148px;box-shadow:inset 0 0 40px rgba(0,0,0,.9),0 0 0 1px rgba(0,200,100,.06)}
.monitor-wrap::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,170,70,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(0,170,70,.18) 1px,transparent 1px),linear-gradient(rgba(0,170,70,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,170,70,.06) 1px,transparent 1px);background-size:40px 40px,40px 40px,8px 8px,8px 8px;pointer-events:none}
.mon-lbl{position:absolute;top:8px;left:12px;font-family:var(--mono);font-size:.58rem;color:rgba(0,230,120,.32);letter-spacing:1px;z-index:2}
.mon-rate{position:absolute;top:8px;right:12px;font-family:var(--mono);font-size:1rem;font-weight:500;color:rgba(0,230,120,.52);z-index:2;transition:color .3s}
.mon-rate.crit{color:#ef4444;animation:rF 1s infinite}
@keyframes rF{0%,100%{opacity:1}50%{opacity:.35}}
.ecg-svg-el{position:absolute;height:100%;width:200%;animation:sE linear infinite;top:0;left:0}
.ecg-svg-el.paused{animation-play-state:paused}
@keyframes sE{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ep{fill:none;stroke:#00e880;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 3px rgba(0,232,128,.5))}
.ep.crit{stroke:#ef4444;filter:drop-shadow(0 0 4px rgba(239,68,68,.65))}
.ep.warn{stroke:#f97316;filter:drop-shadow(0 0 3px rgba(249,115,22,.55))}
.ep.dim{stroke:#3d5570;filter:none}
.noise-on .ep{filter:url(#ecgNoise) drop-shadow(0 0 2px currentColor)}

/* MONITOR CONTROLS */
.mon-ctrl{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:rgba(0,0,0,.25);border-radius:14px;border:1px solid var(--br)}
.mc-left{display:flex;align-items:center;gap:14px}
.mc-tog{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--muted);cursor:pointer;user-select:none}
.mc-tog input{accent-color:var(--blue);cursor:pointer}
.mc-btn{background:var(--sf2);border:1px solid var(--br);color:var(--text);padding:6px 14px;border-radius:8px;font-size:.76rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:5px}
.mc-btn.playing{border-color:rgba(34,197,94,.4);color:var(--green)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:12px 10px;text-align:center}
.stat-card.alert{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.07)}
.sc-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.sc-val{font-size:.92rem;font-weight:800;color:var(--cyan);font-family:var(--mono);word-break:break-word;line-height:1.2}
.sc-val.red{color:var(--red)}
.sc-val.yel{color:var(--yellow)}

/* RHYTHM SELECT */
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.9rem}
#rhythmSelect{width:100%;background:rgba(4,12,24,.85);border:1.5px solid var(--br);border-radius:14px;padding:13px 40px 13px 16px;color:var(--text);font-size:.88rem;font-family:inherit;font-weight:600;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;transition:border-color .2s}
#rhythmSelect:focus{border-color:var(--blue)}
#rhythmSelect optgroup{background:#0a1525;color:var(--muted);font-size:.72rem}
#rhythmSelect option{background:#0a1525;color:var(--text)}

/* CDE SECTIONS */
.cde-sec{border-radius:20px;overflow:hidden;border:1px solid var(--br)}
.cde-hdr{display:flex;align-items:center;gap:8px;padding:11px 16px;background:var(--sf);border-bottom:1px solid var(--br);font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.cde-blk{padding:12px 16px;border-bottom:1px solid var(--br)}
.cde-blk:last-child{border-bottom:none}
.cde-text{font-size:.82rem;color:var(--text);line-height:1.65}

/* LEAD BADGES */
.lb{display:inline-flex;align-items:center;justify-content:center;background:rgba(59,130,246,.14);border:1px solid rgba(59,130,246,.34);color:var(--blue);padding:2px 8px;border-radius:6px;font-family:var(--mono);font-size:.76rem;font-weight:700;margin:2px}
.lb.rec{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.28);color:var(--orange)}
.lb.elv{background:rgba(239,68,68,.11);border-color:rgba(239,68,68,.28);color:var(--red)}

/* STEMI TERRITORY MAP */
.stemi-sec{display:none}
.stemi-sec.on{display:block}
.stemi-title{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin-bottom:10px}
.heart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.hg-zone{border-radius:10px;padding:9px 6px;text-align:center;font-size:.65rem;font-weight:700;border:1px solid var(--br);background:var(--sf);color:var(--muted);transition:all .3s;line-height:1.3}
.hg-zone.on{background:rgba(239,68,68,.17);border-color:rgba(239,68,68,.5);color:#fca5a5;box-shadow:0 0 8px rgba(239,68,68,.18)}
.hg-zone.rec{background:rgba(249,115,22,.09);border-color:rgba(249,115,22,.32);color:var(--orange)}
.terr-box{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.28)}
.terr-name{font-size:.88rem;font-weight:700;color:#fca5a5}
.terr-art{font-size:.7rem;color:var(--muted);margin-top:2px}

/* DRUG CARDS */
.drug-list{display:flex;flex-direction:column;gap:6px}
.dc{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:1px solid var(--br);background:var(--sf)}
.dc-icon{font-size:1.05rem;flex-shrink:0}
.dc-name{font-size:.82rem;font-weight:700;flex:1}
.dc-dose{font-size:.72rem;font-family:var(--mono);color:var(--cyan);margin-top:2px}
.dc.pri{background:rgba(59,130,246,.09);border-color:rgba(59,130,246,.28)}
.dc.crit{background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.28)}
.dc.warn{background:rgba(234,179,8,.07);border-color:rgba(234,179,8,.22)}
.dc.contra{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.18);opacity:.7}

/* ARREST PATHWAY */
.a-steps{display:flex;flex-direction:column}
.a-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--br)}
.a-step:last-child{border-bottom:none}
.a-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;background:var(--sf2);border:1px solid var(--br);color:var(--muted);margin-top:1px}
.a-num.sh{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);color:var(--red)}
.a-num.ep{background:rgba(249,115,22,.2);border-color:rgba(249,115,22,.4);color:var(--orange)}
.a-num.dr{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3);color:var(--blue)}
.a-title{font-size:.82rem;font-weight:700;line-height:1.3}
.a-detail{font-size:.72rem;color:var(--muted);margin-top:2px;line-height:1.4}
</style>
</head>
<body>

<svg style="width:0;height:0;position:absolute" aria-hidden="true">
  <filter id="ecgNoise">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<header class="app-header">
  <a class="hdr-back" href="index.html"><i class="fas fa-arrow-left" style="font-size:.75rem"></i></a>
  <div class="hdr-badge"><i class="fas fa-heartbeat" style="color:#fff;font-size:.88rem"></i></div>
  <div class="hdr-info">
    <div class="hdr-title">ECG Simulator</div>
    <div class="hdr-sub">DCAS CPG 2026 · Clinical Decision Engine</div>
  </div>
  <div class="hdr-pulse"></div>
</header>

<main class="page-body">

  <div class="priority-banner b-green" id="pBanner">
    <div class="pb-icon">🟢</div>
    <div><div class="pb-level" id="pLevel">PRIORITY</div><div class="pb-msg" id="pMsg">Select a rhythm</div><div class="pb-sub" id="pSub"></div></div>
  </div>

  <div class="monitor-wrap" id="monWrap">
    <div class="mon-lbl">LEAD II — CONTINUOUS</div>
    <div class="mon-rate" id="monRate">— bpm</div>
    <svg class="ecg-svg-el" id="ecgSvg" viewBox="0 0 2000 100" preserveAspectRatio="none"></svg>
  </div>

  <div class="mon-ctrl">
    <div class="mc-left">
      <label class="mc-tog"><input type="checkbox" id="noiseT" onchange="applyNoise()"> Artifact</label>
      <label class="mc-tog"><input type="checkbox" id="calT" onchange="toggleCal()"> Cal Pulse</label>
    </div>
    <button class="mc-btn" id="pauseBtn" onclick="togglePause()">
      <i class="fas fa-pause" id="pIcon"></i><span id="pLbl">Pause</span>
    </button>
  </div>

  <div class="stats-row">
    <div class="stat-card" id="rCard"><div class="sc-lbl">Rate</div><div class="sc-val" id="vRate">—</div></div>
    <div class="stat-card"><div class="sc-lbl">PR Interval</div><div class="sc-val" id="vPR">—</div></div>
    <div class="stat-card" id="qCard"><div class="sc-lbl">QRS Duration</div><div class="sc-val" id="vQRS">—</div></div>
  </div>

  <div class="sel-wrap">
    <select id="rhythmSelect" onchange="selectRhythm(this.value)">
      <optgroup label="── Sinus Node Rhythms">
        <option value="nsr">Normal Sinus Rhythm (NSR)</option>
        <option value="stach">Sinus Tachycardia</option>
        <option value="sbrady">Sinus Bradycardia</option>
      </optgroup>
      <optgroup label="── Atrial Rhythms">
        <option value="afib">Atrial Fibrillation (A-Fib)</option>
        <option value="aflutter">Atrial Flutter (2:1)</option>
        <option value="svt">Paroxysmal SVT — Narrow Complex</option>
      </optgroup>
      <optgroup label="── Ventricular — LIFE-THREATENING">
        <option value="vtach">Ventricular Tachycardia (Monomorphic)</option>
        <option value="torsades">Torsades de Pointes</option>
        <option value="coarseVf">Coarse Ventricular Fibrillation</option>
        <option value="fineVf">Fine Ventricular Fibrillation</option>
        <option value="asystole">Asystole</option>
        <option value="pea">PEA — Pulseless Electrical Activity</option>
      </optgroup>
      <optgroup label="── AV Conduction Blocks">
        <option value="block1">1st Degree AV Block</option>
        <option value="block2_1">2nd Degree Type I — Wenckebach</option>
        <option value="block2_2">2nd Degree Type II — Mobitz</option>
        <option value="block3">3rd Degree — Complete Heart Block</option>
      </optgroup>
      <optgroup label="── 12-Lead Ischemia / STEMI">
        <option value="stemi_inf">Inferior STEMI (RCA)</option>
        <option value="stemi_ant">Anterior STEMI (LAD)</option>
        <option value="stemi_sep">Septal STEMI (LAD)</option>
        <option value="stemi_lat">Lateral STEMI (LCx)</option>
        <option value="stemi_ext">Extensive Anterior STEMI — Proximal LAD</option>
        <option value="stdepress">ST Depression / NSTEMI</option>
        <option value="tinvert">T-Wave Inversion</option>
      </optgroup>
    </select>
  </div>

  <!-- STEMI Map -->
  <div class="cde-sec stemi-sec" id="stemiSec">
    <div class="cde-hdr"><i class="fas fa-map-marker-alt" style="color:var(--red)"></i> 12-Lead ST Elevation Territory</div>
    <div class="cde-blk">
      <div class="stemi-title">AFFECTED ZONES</div>
      <div class="heart-grid" id="heartGrid"></div>
      <div class="terr-box">
        <div style="font-size:1.3rem">🫀</div>
        <div><div class="terr-name" id="terrN">—</div><div class="terr-art" id="terrA">—</div></div>
      </div>
    </div>
  </div>

  <!-- Characteristics -->
  <div class="cde-sec">
    <div class="cde-hdr"><i class="fas fa-wave-square" style="color:var(--blue)"></i> ECG Characteristics</div>
    <div class="cde-blk"><div class="cde-text" id="infoChar">Select a rhythm.</div></div>
  </div>

  <!-- Drugs -->
  <div class="cde-sec">
    <div class="cde-hdr"><i class="fas fa-pills" style="color:var(--orange)"></i> Drugs &amp; Interventions</div>
    <div class="cde-blk"><div class="drug-list" id="drugList"></div></div>
  </div>

  <!-- Arrest Pathway -->
  <div class="cde-sec" id="arrestSec" style="display:none">
    <div class="cde-hdr"><i class="fas fa-heartbeat" style="color:var(--red)"></i> Cardiac Arrest Pathway</div>
    <div class="cde-blk"><div class="a-steps" id="aSteps"></div></div>
  </div>

</main>

<script>
'use strict';

/* ══════════════════════════════════════════════════════
   ECG RHYTHM DATABASE  —  every path is 100-unit wide
══════════════════════════════════════════════════════ */
const DB = {
  nsr:{lbl:'Normal Sinus Rhythm',cat:'sinus',path:'M0,50 L14,50 Q18,43 22,50 L36,50 L38,56 L40,9 L42,61 L44,50 L56,50 Q63,38 70,50 L100,50',w:100,spd:'9s',col:'g',rate:'60–100 bpm',pr:'0.12–0.20 s',qrs:'< 0.12 s',rn:72,pri:'GREEN',pMsg:'Normal Sinus Rhythm',pSub:'Routine monitoring. No intervention required.',char:'Regular · Rate 60–100 bpm · P before every QRS · Normal P-QRS-T · Constant PR',drugs:[{i:'✅',n:'No acute medications',d:'Routine monitoring',c:''}],arrest:false,stemi:false},
  stach:{lbl:'Sinus Tachycardia',cat:'sinus',path:'M0,50 L8,50 Q11,43 14,50 L22,50 L24,56 L26,9 L28,61 L30,50 L38,50 Q43,38 48,50 L56,50',w:56,spd:'4.5s',col:'g',rate:'100–160 bpm',pr:'0.12–0.20 s',qrs:'< 0.12 s',rn:120,pri:'YELLOW',pMsg:'Sinus Tachycardia',pSub:'Treat the underlying cause — not the rate.',char:'Regular · Rate > 100 bpm · P before every QRS · Identical to NSR morphology · P may merge with T at fast rates',drugs:[{i:'🔍',n:'Identify & treat the cause',d:'Pain / Hypovolemia / Fever / Anxiety',c:'pri'},{i:'💧',n:'IV Fluid Challenge',d:'NS 250–500 mL if hypovolemia suspected',c:''},{i:'💊',n:'Analgesia if pain-driven',d:'Morphine 2.5 mg IV | Nefopam 20 mg IV',c:''}],arrest:false,stemi:false},
  sbrady:{lbl:'Sinus Bradycardia',cat:'sinus',path:'M0,50 L22,50 Q26,43 30,50 L44,50 L46,56 L48,9 L50,61 L52,50 L64,50 Q71,38 78,50 L100,50',w:100,spd:'14s',col:'b',rate:'< 60 bpm',pr:'0.12–0.20 s',qrs:'< 0.12 s',rn:42,pri:'YELLOW',pMsg:'Sinus Bradycardia',pSub:'Treat only if symptomatic (hypotension, syncope, altered LOC).',char:'Regular · Rate < 60 bpm · Normal P-QRS-T · May be physiological (athletes)',drugs:[{i:'⚕️',n:'Atropine',d:'0.02 mg/kg IV/IO (Adult: 0.5–1 mg)',c:'pri'},{i:'⚡',n:'Transcutaneous Pacing',d:'Rate 60–70 bpm · 50–100 mA — if Atropine fails',c:'warn'},{i:'💊',n:'Dopamine Infusion',d:'5–20 mcg/kg/min IV',c:''}],arrest:false,stemi:false},

/* ══════════════════════════════════════════════════
   CLINICAL DECISION ENGINE
══════════════════════════════════════════════════ */
function analyzeRate(rn){
  if(rn===0) return{s:'arrest'};
  if(rn<40)  return{s:'crit'};
  if(rn<60)  return{s:'yel'};
  if(rn<=100)return{s:''};
  if(rn<=150)return{s:'yel'};
  return     {s:'red'};
}

function generateCDE(key){
  const d = DB[key];
  if(!d) return null;
  return {
    priority:d.pri, pMsg:d.pMsg, pSub:d.pSub,
    rate:analyzeRate(d.rn),
    char:d.char, drugs:d.drugs,
    arrest:d.arrest, steps:d.steps||null, shockable:d.shockable,
    stemi:d.stemi, sd:d.sd||null
  };
}

/* ══════════════════════════════════════════════════
   UI RENDERING
══════════════════════════════════════════════════ */
let paused=false, curKey='nsr';

function selectRhythm(key){
  curKey=key;
  const d=DB[key]; if(!d) return;

  // Monitor
  renderMonitor(d);

  // Stats
  const rv=analyzeRate(d.rn);
  document.getElementById('vRate').textContent=d.rate;
  document.getElementById('vRate').className='sc-val '+(rv.s==='arrest'||rv.s==='crit'?'red':rv.s==='yel'?'yel':'');
  document.getElementById('vPR').textContent=d.pr;
  document.getElementById('vQRS').textContent=d.qrs;
  document.getElementById('vQRS').className='sc-val '+(d.rn&&DB[key].qrs&&DB[key].qrs.includes('WIDE')?'red':'');
  document.getElementById('rCard').className='stat-card'+(rv.s==='arrest'||rv.s==='crit'?' alert':'');

  const mr=document.getElementById('monRate');
  if(d.rn>0){mr.textContent=d.rn+' bpm';mr.className='mon-rate'+(d.pri==='ARREST'||d.rn>150||d.rn<40?' crit':'');}
  else{mr.textContent=d.pri==='ARREST'?'--- ARREST ---':'--- bpm';mr.className='mon-rate'+(d.pri==='ARREST'?' crit':'');}

  const cde=generateCDE(key);
  renderBanner(cde);
  renderSTEMI(cde);
  renderChar(d);
  renderDrugs(cde.drugs);
  renderArrest(cde);

  // Reset pause
  paused=false;
  document.getElementById('ecgSvg').classList.remove('paused');
  document.getElementById('pauseBtn').className='mc-btn';
  document.getElementById('pIcon').className='fas fa-pause';
  document.getElementById('pLbl').textContent='Pause';
}

function renderMonitor(d){
  const svg=document.getElementById('ecgSvg');
  const R=20, tw=d.w*R;
  svg.setAttribute('viewBox',`0 0 ${tw} 100`);
  const cc={c:'crit',w:'warn',d:'dim'}[d.col]||'';
  svg.innerHTML=Array.from({length:R},(_,i)=>`<path class="ep ${cc}" d="${d.path}" transform="translate(${i*d.w},0)"/>`).join('');
  svg.style.animationDuration=d.spd;
  if(paused) svg.classList.add('paused');
}

function renderBanner(cde){
  const b=document.getElementById('pBanner');
  const cls={GREEN:'b-green',YELLOW:'b-yellow',ORANGE:'b-orange',RED:'b-red',ARREST:'b-arrest'};
  const ico={GREEN:'🟢',YELLOW:'🟡',ORANGE:'🟠',RED:'🔴',ARREST:'🚨'};
  b.className='priority-banner '+(cls[cde.priority]||'b-green');
  b.querySelector('.pb-icon').textContent=ico[cde.priority]||'⬜';
  document.getElementById('pLevel').textContent=cde.priority+' — PRIORITY';
  document.getElementById('pMsg').textContent=cde.pMsg;
  document.getElementById('pSub').textContent=cde.pSub;
}

function renderSTEMI(cde){
  const sec=document.getElementById('stemiSec');
  if(!cde.stemi||!cde.sd){sec.classList.remove('on');return;}
  sec.classList.add('on');
  const sd=cde.sd;
  const ZONES=[
    {k:'Sep',l:'Septal\nV1–V2'},{k:'Ant',l:'Anterior\nV3–V4'},{k:'Lat',l:'Lateral\nV5–V6'},
    {k:'Post',l:'Posterior\nV7–V9'},{k:'Inf',l:'Inferior\nII·III·aVF'},{k:'RV',l:'Right\nVentricle'}
  ];
  document.getElementById('heartGrid').innerHTML=ZONES.map(z=>{
    const a=sd.zones&&sd.zones[z.k];
    return`<div class="hg-zone${a?' on':''}">${z.l.replace('\n','<br><span style="font-size:.58rem;opacity:.65">').replace(/$/,'</span>')}</div>`;
  }).join('');
  document.getElementById('terrN').textContent=sd.terr;
  document.getElementById('terrA').textContent=sd.art;
}

function renderChar(d){
  const el=document.getElementById('infoChar');
  let h='';
  if(d.sd){
    if(d.sd.elev&&d.sd.elev.length){h+='<div style="margin-bottom:5px">';d.sd.elev.forEach(l=>h+=`<span class="lb elv">${l}</span>`);h+='</div>';}
    if(d.sd.rec&&d.sd.rec.length){h+='<div style="margin-bottom:8px">';d.sd.rec.forEach(l=>h+=`<span class="lb rec">↓${l}</span>`);h+='</div>';}
  }
  el.innerHTML=h+'<span style="line-height:1.7">'+d.char+'</span>';
}

function renderDrugs(drugs){
  const l=document.getElementById('drugList');
  l.innerHTML=(drugs||[]).map(d=>{
    const cls={pri:'pri',crit:'crit',warn:'warn',contra:'contra'}[d.c]||'';
    return`<div class="dc ${cls}"><div class="dc-icon">${d.i}</div><div><div class="dc-name">${d.n}</div>${d.d?`<div class="dc-dose">${d.d}</div>`:''}</div></div>`;
  }).join('');
}

function renderArrest(cde){
  const sec=document.getElementById('arrestSec');
  if(!cde.arrest||!cde.steps){sec.style.display='none';return;}
  sec.style.display='block';
  const tc={sh:'sh',ep:'ep',dr:'dr'};
  document.getElementById('aSteps').innerHTML=cde.steps.map(s=>`
    <div class="a-step">
      <div class="a-num ${tc[s.t]||''}">${s.n}</div>
      <div><div class="a-title">${s.ti}</div><div class="a-detail">${s.de}</div></div>
    </div>`).join('');
}

function togglePause(){
  paused=!paused;
  const svg=document.getElementById('ecgSvg');
  svg.classList.toggle('paused',paused);
  document.getElementById('pauseBtn').className='mc-btn'+(paused?' playing':'');
  document.getElementById('pIcon').className='fas fa-'+(paused?'play':'pause');
  document.getElementById('pLbl').textContent=paused?'Play':'Pause';
}

function applyNoise(){
  document.getElementById('monWrap').classList.toggle('noise-on',document.getElementById('noiseT').checked);
}

function toggleCal(){
  const on=document.getElementById('calT').checked;
  const svg=document.getElementById('ecgSvg');
  const ex=document.getElementById('calP');
  if(ex)ex.remove();
  if(on){
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('id','calP');
    p.setAttribute('d','M-6,50 L-6,10 L0,10 L0,50');
    p.setAttribute('class','ep');
    p.setAttribute('stroke','rgba(0,232,128,.45)');
    p.setAttribute('stroke-width','1.5');
    svg.firstChild?svg.insertBefore(p,svg.firstChild):svg.appendChild(p);
  }
}

selectRhythm('nsr');
</script>
