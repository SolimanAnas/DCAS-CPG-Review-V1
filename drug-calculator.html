<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DCAS · Drug Calculator 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07111f;--sf:rgba(255,255,255,.06);--sf2:rgba(255,255,255,.10);--br:rgba(255,255,255,.12);--text:#e2e8f0;--muted:#64748b;--hdr:60px;--dc:#3b82f6}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);background-image:radial-gradient(ellipse at 20% 0%,#0f2744 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,#111827 0%,transparent 60%);color:var(--text);min-height:100%;display:flex;flex-direction:column;overflow-x:hidden}

/* HEADER */
.app-header{height:var(--hdr);background:rgba(7,17,31,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:50;flex-shrink:0}
.hdr-back{width:38px;height:38px;border-radius:12px;background:var(--sf2);border:1px solid var(--br);color:var(--text);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:1rem;flex-shrink:0}
.hdr-title{font-size:.95rem;font-weight:700;line-height:1.2}
.hdr-sub{font-size:.68rem;color:var(--muted);font-weight:400}

/* ROOT */
#root{flex:1;display:flex;flex-direction:column;padding:16px 14px;gap:14px;max-width:680px;width:100%;margin:0 auto}

/* DRUG SELECTOR BUTTON */
#drugSelectBtn{width:100%;background:var(--sf);border:2px solid var(--br);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;color:var(--text);font-family:inherit;transition:border-color .2s,background .2s}
#drugSelectBtn.has-drug{border-color:var(--dc);background:color-mix(in srgb,var(--dc) 12%,transparent)}
.dsb-icon{font-size:1.5rem;flex-shrink:0}
.dsb-text{flex:1;min-width:0}
.dsb-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px;display:block}
.dsb-name{font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.dsb-cat{font-size:.7rem;color:var(--muted);display:block;margin-top:1px}
.dsb-arrow{font-size:1.1rem;color:var(--muted);flex-shrink:0}

/* AGE SECTION */
#ageSection{flex-direction:column;gap:10px;display:none}
.age-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}
#ageBar{display:flex;flex-wrap:wrap;gap:7px}
.age-chip{padding:9px 14px;border-radius:30px;font-size:.78rem;font-weight:600;font-family:inherit;border:1.5px solid var(--br);background:var(--sf);color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s}
.age-chip:active{transform:scale(.95)}
.age-chip.chip-nr{opacity:.4}
.age-chip.active{background:var(--dc);border-color:var(--dc);color:#fff;font-weight:700;box-shadow:0 4px 16px color-mix(in srgb,var(--dc) 45%,transparent)}

/* DOSE AREA */
#doseArea{flex:1;display:flex;flex-direction:column}
.dose-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:40px 20px;font-size:.88rem}
.dose-placeholder.full{min-height:220px}
.dp-icon{font-size:2.6rem;opacity:.35;margin-bottom:4px}

/* DOSE RESULT */
.dose-result{display:flex;flex-direction:column;gap:14px;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* PATIENT BANNER */
.pt-banner{display:flex;align-items:center;gap:12px;border-radius:14px;border:1.5px solid;padding:12px 16px}
.pt-icon{font-size:1.5rem}
.pt-age{font-size:.95rem;font-weight:700}
.pt-wt{font-size:.75rem;color:var(--muted);margin-top:2px}

/* N/R BANNER */
.nr-banner{display:flex;align-items:flex-start;gap:12px;background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.3);border-radius:14px;padding:14px 16px;color:#fca5a5;font-weight:600;font-size:.9rem}
.nr-banner>span{font-size:1.4rem;flex-shrink:0}
.nr-sub{font-size:.76rem;font-weight:400;opacity:.8;margin-top:3px}

/* ════ BIG DOSE CARDS ════════════════════════════════════════ */
.dose-card{border-radius:20px;overflow:hidden;border:2px solid color-mix(in srgb,var(--dc) 38%,transparent)}

.dose-card.primary{
  background:linear-gradient(155deg,color-mix(in srgb,var(--dc) 30%,#0f1e33),color-mix(in srgb,var(--dc) 12%,#07111f));
  box-shadow:0 8px 40px color-mix(in srgb,var(--dc) 28%,transparent),0 0 0 1px color-mix(in srgb,var(--dc) 18%,transparent) inset
}
.dose-card.secondary{background:color-mix(in srgb,var(--dc) 8%,var(--sf))}
.dose-card.nr-card{opacity:.5;border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06)}

/* Indication label */
.dc-ind{padding:12px 18px 9px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.3px;color:color-mix(in srgb,var(--dc) 85%,#fff);border-bottom:1px solid color-mix(in srgb,var(--dc) 18%,transparent)}
.dose-card.secondary .dc-ind{color:var(--muted)}

/* Dose body with the BIG numbers */
.dc-body{display:flex;align-items:stretch}
.dc-col{flex:1;padding:16px 20px 20px;display:flex;flex-direction:column;gap:4px}
.dc-sep{width:1px;background:color-mix(in srgb,var(--dc) 18%,transparent);margin:8px 0}

.dc-lbl{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1.6px;color:color-mix(in srgb,var(--dc) 75%,#fff);opacity:.85}
.dose-card.secondary .dc-lbl{color:var(--muted)}

/* THE BIG VALUE — core of the UI */
.dc-val{
  font-size:clamp(2.4rem,11vw,3.8rem);
  font-weight:900;
  letter-spacing:-1.5px;
  line-height:1;
  color:#ffffff;
  word-break:break-word
}
.dc-val.vol{color:color-mix(in srgb,var(--dc) 55%,#fff);font-size:clamp(2rem,9vw,3.2rem)}
.dc-val.nr{color:#f87171;font-size:clamp(1.6rem,8vw,2.4rem)}
.dose-card.secondary .dc-val{font-size:clamp(2rem,9vw,3rem)}
.dose-card.secondary .dc-val.vol{font-size:clamp(1.8rem,8vw,2.6rem)}

/* Info rows */
.dc-info{padding:9px 18px 14px;border-top:1px solid color-mix(in srgb,var(--dc) 14%,transparent);display:flex;flex-direction:column;gap:5px}
.ir{display:flex;gap:8px;align-items:flex-start;font-size:.74rem;line-height:1.45}
.ir-l{font-weight:700;color:var(--muted);flex-shrink:0;min-width:86px}
.ir-v{color:var(--text)}
.ir-v.w{color:#fcd34d}

/* ── PICKER MODAL ──────────────────────────────────────────── */
#pickerModal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;flex-direction:column;justify-content:flex-end}
#pickerModal.open{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.picker-sheet{background:#0d1f38;border-top:1px solid var(--br);border-radius:24px 24px 0 0;display:flex;flex-direction:column;max-height:88vh;padding-bottom:max(16px,env(safe-area-inset-bottom));animation:sheetUp .3s cubic-bezier(.25,1,.5,1)}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

.picker-handle{width:36px;height:4px;border-radius:2px;background:var(--muted);margin:10px auto 12px;flex-shrink:0}
.picker-title{text-align:center;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:0 16px 8px;flex-shrink:0}
.picker-search-wrap{padding:0 12px 10px;flex-shrink:0}
.picker-search-wrap input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid var(--br);border-radius:14px;padding:11px 16px;font-size:.9rem;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s}
.picker-search-wrap input:focus{border-color:#3b82f6}
.picker-search-wrap input::placeholder{color:var(--muted)}

#pickerList{overflow-y:auto;padding:2px 8px 20px;flex:1}
#pickerList::-webkit-scrollbar{width:4px}
#pickerList::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}

.pc-header{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--cat,var(--muted));padding:12px 10px 4px;border-left:3px solid var(--cat,var(--muted));margin-top:4px}
.pc-drug{width:100%;text-align:left;background:none;border:none;color:var(--text);font-family:inherit;font-size:.88rem;font-weight:500;padding:10px 12px;border-radius:11px;cursor:pointer;transition:background .1s;display:block}
.pc-drug:active{background:var(--sf2)}
.pc-drug.active{background:#1d4ed8;color:#fff;font-weight:700}

.boot-err{text-align:center;padding:60px 20px;color:#f87171;line-height:1.6}
</style>
</head>
<body>

<header class="app-header">
  <a class="hdr-back" href="index.html">←</a>
  <div>
    <div class="hdr-title">💊 Drug Calculator</div>
    <div class="hdr-sub">DCAS CPG 2026 · Medication Matrix</div>
  </div>
</header>

<div id="pickerModal" onclick="if(event.target===this)closePicker()">
  <div class="picker-sheet">
    <div class="picker-handle" onclick="closePicker()"></div>
    <div class="picker-title">Select Medication</div>
    <div class="picker-search-wrap">
      <input id="pickerSearch" type="text" placeholder="🔍  Search drug…"
             oninput="filterPicker(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div id="pickerList"></div>
  </div>
</div>

<div id="root">
  <button id="drugSelectBtn" onclick="openPicker()">
    <span class="dsb-icon">💊</span>
    <span class="dsb-text">
      <span class="dsb-label">Medication</span>
      <span class="dsb-name">Tap to select a drug</span>
      <span class="dsb-cat"></span>
    </span>
    <span class="dsb-arrow">▾</span>
  </button>

  <section id="ageSection">
    <div class="age-label">Age Group</div>
    <div id="ageBar"></div>
  </section>

  <div id="doseArea"></div>
</div>

<script src="drug-calculator.js"></script>
<script>boot();</script>
</body>
</html>
